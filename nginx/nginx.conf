events {}

http {
    # Grupo de servidores para multiplicação
    upstream mult_servers {
        server mult-1:5000 weight=3; 
        server mult-2:5000 weight=1; 
        server mult-3:5000 backup;   
    }

    server {
        listen 80;
        server_name app.com;

        location /mult {
            proxy_pass http://mult_servers;
            proxy_set_header Host $host;
        }

        location /ping {
            proxy_pass http://ping:5000;
        }

        location /soma {
            proxy_pass http://soma:5000;
        }

        location /sub {
            proxy_pass http://sub:5000;
        }
    }
}